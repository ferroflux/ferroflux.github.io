<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scramble Text Demo</title>
  <style>
    body {
      display: grid;
      place-items: center;
      height: 100vh;
      background: black;
      color: white;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1 data-value="FERROFLUX">FERROFLUX</h1>

  <script>
    const letters = " ~!@#$%^&*()-_=+[]{}\\|;:'\",.<>?/`1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";

    function scrambleText(element) {
      let interval = null;
      element.onmouseover = () => {
        let iteration = 0;
        clearInterval(interval);

        interval = setInterval(() => {
          element.innerHTML = element.dataset.value
            .split("")
            .map((char, i) => {
              if (i < iteration) {
                return `<span style="color:white">${element.dataset.value[i]}</span>`;
              }
              const r = Math.floor(Math.random() * 256);
              const g = Math.floor(Math.random() * 256);
              const b = Math.floor(Math.random() * 256);
              const randomChar = letters[Math.floor(Math.random() * letters.length)];
              return `<span style="color:rgb(${r},${g},${b})">${randomChar}</span>`;
            })
            .join("");

          if (iteration >= element.dataset.value.length) {
            clearInterval(interval);
            element.innerHTML = element.dataset.value
              .split("")
              .map(c => `<span style="color:white">${c}</span>`)
              .join("");
          }
          iteration += 1 / 3;
        }, 60);
      };
    }

    scrambleText(document.querySelector("h1"));
  </script>
</body>
</html>
